services:
  postgres:
    image: postgres:16-alpine
    container_name: zh-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-identity_hanzi}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      USERS_DB: ${USERS_DB:-users_hanzi}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/01-init-multiple-databases.sh:ro
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-identity_hanzi}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: zh-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro # Mount thư mục chứa chứng chỉ SSL từ host vào container, đảm bảo chỉ đọc (ro)
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Mount file cấu hình nginx, đảm bảo chỉ đọc (ro)
      - ./deploy/nginx/certs:/etc/nginx/certs:ro # Mount thư mục chứa chứng chỉ SSL cho nginx, đảm bảo chỉ đọc (ro),mà nó là symlink tới /etc/letsencrypt/live/yourdomain.com
    depends_on:
      - next-app
      - dotnet-api
    restart: unless-stopped
    networks:
      - app-network

  next-app:
    container_name: zh-next
    build:
      context: ./fe-hanzi-anhvu
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_BASE_URL}
        NEXTAUTH_URL: ${PUBLIC_BASE_URL}
    environment:
      NODE_ENV: production
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${PUBLIC_BASE_URL}
      NEXT_PUBLIC_SITE_URL: ${PUBLIC_BASE_URL}
      NEXT_PUBLIC_API_BASE_URL: /api
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - app-network

  dotnet-api:
    container_name: zh-api
    build:
      context: ./backend/src
      dockerfile: hanzi-anhvu-hsk/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080 # Lắng nghe trên tất cả các interface để có thể truy cập từ bên ngoài container
      ConnectionStrings__AuthIdentityDbConnection: ${AUTH_IDENTITY_DB_CONNECTION}
      ConnectionStrings__UsersDbConnection: ${USERS_DB_CONNECTION}
      ConnectionStrings__LessonDbConnection: ${LESSON_DB_CONNECTION}
      ConnectionStrings__ClassroomDbConnection: ${CLASSROOM_DB_CONNECTION}
      ConnectionStrings__redis-hanzi: redis:6379
      OcrService__BaseUrl: http://ocr-service:8000
      OcrService__TimeoutSeconds: ${OCR_TIMEOUT_SECONDS:-120}
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-changeme} # Đảm bảo đặt mật khẩu mạnh cho Elasticsearch trong môi trường production
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      ocr-service:
        condition: service_started
      elasticsearch:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  elasticsearch:
    container_name: zh-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    expose:
      - "9200"
      - "9300"
    restart: unless-stopped
    networks:
      - app-network

  redis:
    container_name: zh-redis
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    restart: unless-stopped # Đảm bảo Redis luôn chạy, trừ khi bị dừng thủ công
    networks:
      - app-network

  ocr-service:
    container_name: zh-ocr
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    environment:
      OCR_LANG: ch
      PADDLE_OCR_USE_GPU: "false"
      OCR_PREPROCESS: "true"
      MAX_FILE_SIZE_MB: 20
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  elasticsearch-data:
  redis-data:
