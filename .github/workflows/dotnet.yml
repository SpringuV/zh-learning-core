# This workflow builds the backend, pushes a Docker image, and deploys to VPS

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore ./backend/src/hanzi-anhvu-hsk/HanziAnhVuHsk.Api.csproj
      - name: Build project
        run: dotnet build --no-restore --configuration Release ./backend/src/hanzi-anhvu-hsk/HanziAnhVuHsk.Api.csproj

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        # echo là để tránh lộ mật khẩu trong logs
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build Docker image (backend)
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/hanzi-app-backend:latest -f backend/src/hanzi-anhvu-hsk/Dockerfile backend/src
      - name: Build Docker image (frontend)
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }} \
            --build-arg NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }} \
            --build-arg NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }} \
            -t ${{ secrets.DOCKER_USERNAME }}/hanzi-app-frontend:latest \
            -f fe-hanzi-anhvu/Dockerfile fe-hanzi-anhvu
      - name: Push Docker image (backend)
        run: docker push ${{ secrets.DOCKER_USERNAME }}/hanzi-app-backend:latest
      - name: Push Docker image (frontend)
        run: docker push ${{ secrets.DOCKER_USERNAME }}/hanzi-app-frontend:latest

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS
        # appleboy/ssh-action@master uses SSH key authentication to run commands on the remote server.
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR }}"
            if [ -z "$DEPLOY_DIR" ]; then
              DEPLOY_DIR="/home/${{ secrets.SSH_USERNAME }}/zh-learning-core"
            fi
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }} .
            else
              git pull origin main
            fi
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            docker compose --env-file .env.production -f docker-compose.production.yml pull
            docker compose --env-file .env.production -f docker-compose.production.yml up -d --remove-orphans
