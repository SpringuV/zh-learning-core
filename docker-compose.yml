  api:
    build:
      context: ./backend/hanzi-anhvu-hsk
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - OcrService__BaseUrl=http://ocr-service:8000
      - OcrService__TimeoutSeconds=120
    ports:
      - "8080:8080"
    depends_on:
      - ocr-service

  ocr-service:
    build:
      context: ./backend/ocr-service
      dockerfile: Dockerfile
    environment:
      - OCR_LANG=ch
      - PADDLE_OCR_USE_GPU=false
      - OCR_PREPROCESS=true
      - MAX_FILE_SIZE_MB=20
    ports:
      - "8000:8000"
